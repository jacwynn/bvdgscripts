name: BVDG-VET Import Pipeline

on:
  schedule:
    # Run every other day at 9:00 AM UTC
    - cron: '0 9 */2 * *'

  workflow_dispatch:
    inputs:
      animals_only:
        description: 'Filter to animal products only'
        required: false
        default: 'false'
      delta:
        description: 'Only process products where price or inventory changed'
        required: false
        default: 'true'

env:
  PYTHON_VERSION: '3.13'

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download vendor feed from FTP
        run: |
          python3 << 'EOF'
          import ftplib
          import os

          # FTP Configuration (UPDATE WITH REAL CREDENTIALS)
          FTP_SERVER = "${{ secrets.FTP_SERVER }}"
          FTP_USER = "${{ secrets.FTP_USER }}"
          FTP_PASS = "${{ secrets.FTP_PASS }}"
          FTP_FILE_PATH = "${{ secrets.FTP_FILE_PATH }}"

          OUTPUT_FILE = "./BVDG-VET/vet-med-data-feed.csv"
          os.makedirs("./BVDG-VET", exist_ok=True)

          try:
              print(f"Connecting to FTP server: {FTP_SERVER}")
              with ftplib.FTP(FTP_SERVER, FTP_USER, FTP_PASS) as ftp:
                  print("Connected! Downloading file...")
                  with open(OUTPUT_FILE, 'wb') as f:
                      ftp.retrbinary(f'RETR {FTP_FILE_PATH}', f.write)
              print(f"✓ Downloaded to {OUTPUT_FILE}")
          except Exception as e:
              print(f"❌ FTP download failed: {e}")
              raise
          EOF

      - name: Run pipeline (all products)
        if: github.event.inputs.animals_only != 'true'
        run: |
          DELTA_FLAG=""
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.delta }}" == "true" ]; then
            DELTA_FLAG="--delta"
          fi
          python3 pipeline.py --input ./BVDG-VET/vet-med-data-feed.csv $DELTA_FLAG

      - name: Run pipeline (animals only)
        if: github.event.inputs.animals_only == 'true'
        run: |
          DELTA_FLAG=""
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event.inputs.delta }}" == "true" ]; then
            DELTA_FLAG="--delta"
          fi
          python3 pipeline.py --input ./BVDG-VET/vet-med-data-feed.csv --animals-only $DELTA_FLAG

      - name: Output delta summary
        run: |
          STATS=./BVDG-VET/delta-stats.txt
          if [ -f "$STATS" ]; then
            TOTAL=$(grep "^total=" $STATS | cut -d= -f2)
            KEPT=$(grep "^kept=" $STATS | cut -d= -f2)
            NEW=$(grep "^new_items=" $STATS | cut -d= -f2)
            CHANGES=$(grep "^price_inv_changes=" $STATS | cut -d= -f2)
            SKIPPED=$(grep "^skipped=" $STATS | cut -d= -f2)
            PCT=$(grep "^pct=" $STATS | cut -d= -f2)

            echo "### Delta Filter Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total rows in feed | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| New items | $NEW |" >> $GITHUB_STEP_SUMMARY
            echo "| Price / inventory changes | $CHANGES |" >> $GITHUB_STEP_SUMMARY
            echo "| **Rows to process (delta)** | **$KEPT ($PCT%)** |" >> $GITHUB_STEP_SUMMARY
            echo "| Rows skipped (no change) | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit snapshot back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Untrack old snapshots from index without deleting from disk
          git rm --cached BVDG-VET/previous-feed-snapshot-*.csv 2>/dev/null || true

          # Stage the new snapshot
          git add BVDG-VET/previous-feed-snapshot-*.csv
          git diff --cached --quiet || git commit -m "chore: update feed snapshot [skip ci]"
          git push

      - name: Upload batches to Google Sheets
        if: always()
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        run: |
          # Write credentials to temp file to avoid JSON parsing issues
          echo "$GOOGLE_CREDS" > /tmp/google-creds.json

          python3 << 'EOF'
          import gspread
          from google.oauth2.service_account import Credentials
          import json
          import os
          import pandas as pd
          import glob

          # Authenticate with service account
          with open('/tmp/google-creds.json') as f:
              creds_info = json.load(f)
          creds = Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/spreadsheets']
          )
          gc = gspread.authorize(creds)

          # Open the sheet
          SHEET_ID = "1nhrBaru4B7wq-cYJ5S4Zex1sVvrBuPN3FvL8qP03WRg"
          sheet = gc.open_by_key(SHEET_ID)
          print(f"✓ Connected to Google Sheet: {sheet.title}")

          # Find all batch files
          batch_dir = "./BVDG-VET/ready-to-import"
          batch_files = sorted(glob.glob(os.path.join(batch_dir, "**/batch_*.csv"), recursive=True))

          if not batch_files:
              print("⚠ No batch files found to upload")
          else:
              for batch_file in batch_files:
                  # Extract batch number from filename
                  batch_name = os.path.basename(batch_file)
                  batch_num = batch_name.replace("batch_", "").replace(".csv", "")
                  sheet_title = f"batch_{batch_num}"

                  # Read CSV
                  df = pd.read_csv(batch_file)

                  # Replace NaN with empty strings (JSON doesn't support NaN)
                  df = df.fillna('')

                  # Get or create worksheet
                  try:
                      ws = sheet.worksheet(sheet_title)
                      print(f"  Using existing tab: {sheet_title}")
                  except gspread.exceptions.WorksheetNotFound:
                      ws = sheet.add_worksheet(title=sheet_title, rows=len(df) + 10, cols=len(df.columns))
                      print(f"  Created new tab: {sheet_title}")

                  # Clear existing data
                  ws.clear()

                  # Prepare all rows including headers
                  all_rows = [df.columns.tolist()]
                  for idx, row in df.iterrows():
                      # Convert to list and handle any remaining non-JSON-compliant values
                      row_data = ['' if pd.isna(val) else str(val) for val in row.tolist()]
                      all_rows.append(row_data)

                  # Append all rows at once (single API call instead of N calls)
                  ws.append_rows(all_rows)

                  print(f"✓ Uploaded {batch_name} → {sheet_title} ({len(df)} rows)")

              print(f"\n✓ All {len(batch_files)} batch files uploaded to Google Sheet")
          EOF

      - name: Upload pipeline output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrixify-batches-${{ github.run_id }}
          path: ./BVDG-VET/ready-to-import/
          retention-days: 30

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Pipeline completed successfully!"
          echo "Download batches from GitHub Actions artifacts"
          echo "Then upload to Google Drive or Dropbox for Matrixify"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed!"
          exit 1
