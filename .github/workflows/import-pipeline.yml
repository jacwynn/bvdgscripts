name: BVDG-VET Import Pipeline

on:
  schedule:
    # Run every Monday at 9:00 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * 1'

  workflow_dispatch:
    inputs:
      animals_only:
        description: 'Filter to animal products only'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.13'

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download vendor feed from FTP
        run: |
          python3 << 'EOF'
          import ftplib
          import os

          # FTP Configuration (UPDATE WITH REAL CREDENTIALS)
          FTP_SERVER = "${{ secrets.FTP_SERVER }}"
          FTP_USER = "${{ secrets.FTP_USER }}"
          FTP_PASS = "${{ secrets.FTP_PASS }}"
          FTP_FILE_PATH = "${{ secrets.FTP_FILE_PATH }}"

          OUTPUT_FILE = "./BVDG-VET/vet-med-data-feed.csv"
          os.makedirs("./BVDG-VET", exist_ok=True)

          try:
              print(f"Connecting to FTP server: {FTP_SERVER}")
              with ftplib.FTP(FTP_SERVER, FTP_USER, FTP_PASS) as ftp:
                  print("Connected! Downloading file...")
                  with open(OUTPUT_FILE, 'wb') as f:
                      ftp.retrbinary(f'RETR {FTP_FILE_PATH}', f.write)
              print(f"✓ Downloaded to {OUTPUT_FILE}")
          except Exception as e:
              print(f"❌ FTP download failed: {e}")
              raise
          EOF

      - name: Run pipeline (all products)
        if: github.event.inputs.animals_only == 'false' || github.event_name == 'schedule'
        run: |
          python3 pipeline.py --input ./BVDG-VET/vet-med-data-feed.csv

      - name: Run pipeline (animals only)
        if: github.event.inputs.animals_only == 'true'
        run: |
          python3 pipeline.py --input ./BVDG-VET/vet-med-data-feed.csv --animals-only

      - name: Upload batches to Google Drive
        run: |
          python3 << 'EOF'
          import os
          import json
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Parse service account credentials
          creds_json = "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}"
          creds_dict = json.loads(creds_json)
          creds = Credentials.from_service_account_info(creds_dict, scopes=['https://www.googleapis.com/auth/drive'])

          # Build Drive API client
          drive_service = build('drive', 'v3', credentials=creds)
          parent_folder_id = "${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"

          # Upload all batch files
          batch_dir = './BVDG-VET/ready-to-import/'
          for root, dirs, files in os.walk(batch_dir):
              for file in files:
                  if file.endswith('.csv'):
                      file_path = os.path.join(root, file)
                      print(f"Uploading {file}...")

                      file_metadata = {
                          'name': file,
                          'parents': [parent_folder_id]
                      }

                      media = MediaFileUpload(file_path, mimetype='text/csv')
                      file_obj = drive_service.files().create(
                          body=file_metadata,
                          media_body=media,
                          fields='id'
                      ).execute()

                      print(f"  ✓ Uploaded: {file_obj['id']}")

          print("\n✓ All batches uploaded to Google Drive!")
          EOF

      - name: Upload pipeline output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrixify-batches-${{ github.run_id }}
          path: ./BVDG-VET/ready-to-import/
          retention-days: 30

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Pipeline completed successfully!"
          echo "Batches ready in Google Drive folder: BVDG-VET-Imports"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed!"
          exit 1
